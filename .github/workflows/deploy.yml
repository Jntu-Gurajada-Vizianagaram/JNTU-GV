name: Auto Deploy to Production

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types: [closed]

jobs:
  deploy:
    name: Deploy to SSH host (on tag push or merged PR to main)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' || (
        github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
      )

    steps:
      - name: Execute remote deploy (safe pull, build, health-check, rollback)
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          script: |
            set -euo pipefail
            TARGET_DIR=/home/jntugv/htdocs/jntugv.edu.in/JNTU-GV
            BRANCH=main
            HEALTH_URL=http://127.0.0.1:3000/

            echo "Starting remote deploy: branch=${BRANCH} target=${TARGET_DIR}"
            if [ ! -d "$TARGET_DIR" ]; then
              echo "ERROR: target dir not found: $TARGET_DIR" >&2
              exit 2
            fi

            cd "$TARGET_DIR"
            git fetch origin --prune
            git checkout "$BRANCH"

            CURRENT_COMMIT=$(git rev-parse --short HEAD)
            TS=$(date +%s)
            BACKUP_DIR="${TARGET_DIR}/build_backup_${CURRENT_COMMIT}_${TS}"

            if [ -d build ]; then
              echo "Backing up current build to $BACKUP_DIR"
              mv build "$BACKUP_DIR"
            fi

            echo "Attempting safe pull (fast-forward only) from origin/$BRANCH"
            if ! git pull --ff-only origin "$BRANCH"; then
              echo "Git pull failed (non-fast-forward). Restoring backup and exiting." >&2
              if [ -d "$BACKUP_DIR" ]; then
                mv "$BACKUP_DIR" build || true
              fi
              exit 3
            fi

            echo "Installing dependencies"
            npm ci

            echo "Building production assets"
            if ! npm run build; then
              echo "Build failed. Restoring previous build and exiting." >&2
              rm -rf build || true
              if [ -d "$BACKUP_DIR" ]; then
                mv "$BACKUP_DIR" build || true
              fi
              exit 4
            fi

            PM2_PROCESS_NAME="${{ secrets.PM2_PROCESS_NAME }}"
            PM2_PROCESS_NAME="${PM2_PROCESS_NAME:-jntugv}"
            echo "Reloading pm2 process ${PM2_PROCESS_NAME}"
            if command -v pm2 >/dev/null 2>&1; then
              pm2 reload "$PM2_PROCESS_NAME" || pm2 restart "$PM2_PROCESS_NAME" || true
            else
              echo "WARNING: pm2 not found; skipping reload"
            fi

            echo "Performing health check: $HEALTH_URL"
            if command -v curl >/dev/null 2>&1; then
              if curl --fail --silent --show-error --max-time 10 "$HEALTH_URL" >/dev/null; then
                echo "Health check passed; removing backup"
                if [ -d "$BACKUP_DIR" ]; then
                  rm -rf "$BACKUP_DIR" || true
                fi
                exit 0
              else
                echo "Health check failed; rolling back to backup" >&2
                rm -rf build || true
                if [ -d "$BACKUP_DIR" ]; then
                  mv "$BACKUP_DIR" build || true
                fi
                if command -v pm2 >/dev/null 2>&1; then
                  pm2 reload "$PM2_PROCESS_NAME" || pm2 restart "$PM2_PROCESS_NAME" || true
                fi
                exit 5
              fi
            else
              echo "curl missing; skipping health check (deploy considered complete)"
              exit 0
            fi
