<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - Page Not Found</title>
    <style>
      body { margin:0; font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif; background:#f5f7fb; color:#1f2937; display:flex; align-items:center; justify-content:center; min-height:100vh; }
      .page { text-align:center; padding:40px; max-width:600px; }
      .code { font-size:96px; font-weight:700; color:#2563eb; margin:0; }
      h1 { margin:0 0 18px; font-size:32px; }
      p { margin:0 0 24px; line-height:1.7; color:#475569; }
      .button { display:inline-block; padding:12px 24px; background:#2563eb; color:#ffffff; text-decoration:none; border-radius:8px; font-weight:600; }
      .button:hover { background:#1d4ed8; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>Sorry, the page you are looking for may have been moved, renamed, or does not exist.</p>
      <a class="button" href="/">Go back to Home</a>
    </div>
  </body>
</html>
