<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maintenance Mode</title>
    <style>
      body { margin:0; font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif; background:#eff6ff; color:#1f2937; display:flex; align-items:center; justify-content:center; min-height:100vh; }
      .page { text-align:center; padding:40px; max-width:640px; }
      .label { display:inline-block; padding:10px 18px; background:#2563eb; color:#ffffff; border-radius:999px; font-size:14px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:20px; }
      h1 { margin:0 0 18px; font-size:36px; }
      p { margin:0 0 24px; line-height:1.7; color:#475569; }
      .button { display:inline-block; padding:12px 24px; background:#2563eb; color:#ffffff; text-decoration:none; border-radius:8px; font-weight:600; }
      .button:hover { background:#1d4ed8; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="label">Maintenance</div>
      <h1>We’ll be back soon</h1>
      <p>Our website is currently undergoing scheduled maintenance. We’re working on improvements and will be back online shortly. Thank you for your patience.</p>
      <a class="button" href="/">Return to Home</a>
    </div>
  </body>
</html>
